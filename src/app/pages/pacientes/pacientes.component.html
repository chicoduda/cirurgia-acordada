<mat-toolbar color="primary" class="toolbar">
    <span>Cadastro de Pacientes</span>
  </mat-toolbar>
  
  <div class="container">
  
    <!-- Formulário de Paciente -->
    <mat-card class="card-form">
      <mat-card-header>
        <mat-card-title>{{ editandoId ? 'Editar Paciente' : 'Novo Paciente' }}</mat-card-title>
      </mat-card-header>
  
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="salvar()" class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Nome</mat-label>
            <input matInput formControlName="nome" placeholder="Digite o nome completo" />
          </mat-form-field>
  
          <mat-form-field appearance="outline">
            <mat-label>Data de Nascimento</mat-label>
            <input matInput type="date" formControlName="dataNascimento" />
          </mat-form-field>
  
          <mat-form-field appearance="outline">
            <mat-label>Telefone</mat-label>
            <input matInput formControlName="telefone" placeholder="(xx) xxxxx-xxxx" />
          </mat-form-field>
  
          <div class="acoes">
            <button mat-raised-button color="primary" type="submit">
              {{ editandoId ? 'Salvar Alterações' : 'Cadastrar' }}
            </button>
            <button mat-stroked-button type="button" (click)="cancelar()">Cancelar</button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  
    <!-- Lista de Pacientes -->
    <mat-card class="card-lista">
      <mat-card-header>
        <mat-card-title>Lista de Pacientes</mat-card-title>
      </mat-card-header>
  
      <mat-card-content>
        <div *ngIf="carregando" class="carregando">
          <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
          <p>Carregando pacientes...</p>
        </div>
  
        <div *ngIf="!carregando && (pacientes$ | async)?.length === 0" class="sem-dados">
          Nenhum paciente encontrado.
        </div>
  
        <div *ngIf="pacientes$ | async as pacientes">
          <table mat-table [dataSource]="pacientes || []" class="mat-elevation-z2 tabela">
  
            <!-- Nome -->
            <ng-container matColumnDef="nome">
              <th mat-header-cell *matHeaderCellDef>Nome</th>
              <td mat-cell *matCellDef="let p">{{ p.nome }}</td>
            </ng-container>
  
            <!-- Data de Nascimento -->
            <ng-container matColumnDef="dataNascimento">
              <th mat-header-cell *matHeaderCellDef>Data de Nascimento</th>
              <td mat-cell *matCellDef="let p">{{ p.dataNascimento | date:'dd/MM/yyyy' }}</td>
            </ng-container>
  
            <!-- Telefone -->
            <ng-container matColumnDef="telefone">
              <th mat-header-cell *matHeaderCellDef>Telefone</th>
              <td mat-cell *matCellDef="let p">{{ p.telefone }}</td>
            </ng-container>
  
            <!-- Ações -->
            <ng-container matColumnDef="acoes">
              <th mat-header-cell *matHeaderCellDef>Ações</th>
              <td mat-cell *matCellDef="let p">
                <button mat-icon-button color="primary" (click)="editar(p)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="excluir(p)">
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>
  
            <!-- Cabeçalho e Linhas -->
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>
      </mat-card-content>
    </mat-card>
  
  </div>
