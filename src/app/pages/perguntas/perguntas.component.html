<mat-toolbar color="primary" class="toolbar">
    <span>Cadastro de Perguntas</span>
  </mat-toolbar>
  
  <div class="container">
  
    <!-- Formulário de Pergunta -->
    <mat-card class="card-form">
      <mat-card-header>
        <mat-card-title>{{ editando ? 'Editar Pergunta' : 'Nova Pergunta' }}</mat-card-title>
      </mat-card-header>
  
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="salvarPergunta()" class="form-grid">
  
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Pergunta</mat-label>
            <textarea matInput formControlName="texto" placeholder="Digite o texto da pergunta"></textarea>
          </mat-form-field>
  
          <mat-form-field appearance="outline">
            <mat-label>Tipo</mat-label>
            <mat-select formControlName="tipo">
              <mat-option value="simnao">Sim / Não</mat-option>
              <mat-option value="multipla">Múltipla escolha</mat-option>
              <mat-option value="aberta">Aberta</mat-option>
            </mat-select>
          </mat-form-field>
  
          <mat-form-field appearance="outline">
            <mat-label>Categoria</mat-label>
            <input matInput formControlName="categoria" placeholder="Ex: Pré-operatório" />
          </mat-form-field>
  
          <div class="acoes">
            <button mat-raised-button color="primary" type="submit">
              {{ editando ? 'Salvar Alterações' : 'Cadastrar' }}
            </button>
            <button mat-stroked-button type="button" (click)="cancelarEdicao()">Cancelar</button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  
    <!-- Lista de Perguntas -->
    <mat-card class="card-lista">
      <mat-card-header>
        <mat-card-title>Lista de Perguntas</mat-card-title>
      </mat-card-header>
  
      <mat-card-content>
        <div *ngIf="carregando" class="carregando">
          <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
          <p>Carregando perguntas...</p>
        </div>
  
        <div *ngIf="!carregando && (perguntas$ | async)?.length === 0" class="sem-dados">
          Nenhuma pergunta cadastrada.
        </div>
  
        <div *ngIf="perguntas$ | async as perguntas">
          <table mat-table [dataSource]="perguntas || []" class="mat-elevation-z2 tabela">
  
            <!-- Texto -->
            <ng-container matColumnDef="texto">
              <th mat-header-cell *matHeaderCellDef>Pergunta</th>
              <td mat-cell *matCellDef="let p">{{ p.texto }}</td>
            </ng-container>
  
            <!-- Tipo -->
            <ng-container matColumnDef="tipo">
              <th mat-header-cell *matHeaderCellDef>Tipo</th>
              <td mat-cell *matCellDef="let p">{{ p.tipo }}</td>
            </ng-container>
  
            <!-- Categoria -->
            <ng-container matColumnDef="categoria">
              <th mat-header-cell *matHeaderCellDef>Categoria</th>
              <td mat-cell *matCellDef="let p">{{ p.categoria }}</td>
            </ng-container>
  
            <!-- Ações -->
            <ng-container matColumnDef="acoes">
              <th mat-header-cell *matHeaderCellDef>Ações</th>
              <td mat-cell *matCellDef="let p">
                <button mat-icon-button color="primary" (click)="editarPergunta(p)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="excluirPergunta(p)">
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>
  
            <!-- Cabeçalho e Linhas -->
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
